<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App_UI_Frontend</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons (necesario para los íconos) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container-fluid">
            <!--Soy un logo-->
            <img src="./img/logo/logo.svg" style="margin: 15px;" width="100px" height="60px">

            <!--Soy un btn hamburguesa-->

            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!--Soy el contenido que colapsa-->

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul
                    class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
                    <li class="nav-item">
                        <a href="#" class="nav-link py-3 px-2" title="" data-bs-toggle="tooltip"
                            data-bs-placement="right" data-bs-original-title="Home">
                            <i class="bi-house fs-1"></i>
                            <span>Home</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link py-3 px-2" title="" data-bs-toggle="tooltip"
                            data-bs-placement="right" data-bs-original-title="Products">
                            <i class="bi-heart fs-1"></i>
                            <span>Products</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link py-3 px-2" title="" data-bs-toggle="tooltip"
                            data-bs-placement="right" data-bs-original-title="Pages">
                            <i class="bi bi-file-earmark fs-1"></i>
                            <span>Pages</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link py-3 px-2" title="" data-bs-toggle="tooltip"
                            data-bs-placement="right" data-bs-original-title="Apps">
                            <i class="bi bi-google-play fs-1"></i>
                            <span>Apps</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link py-3 px-2" title="" data-bs-toggle="tooltip"
                            data-bs-placement="right" data-bs-original-title="Docs">
                            <i class="bi bi-file-earmark-code fs-1"></i>
                            <span>Docs</span>
                        </a>
                    </li>
                </ul>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-primary btn-sm">Sign in</button>
                    <button type="button" class="btn btn-secondary btn-sm">Buy now</button>

                </div>


            </div>
        </div>



    </nav>


    <nav class="navbar navbar-light" style="background-color: #e3f2fd;">
        <!-- Navbar content -->
    </nav>

    <!-- Scripts de Bootstrap (necesarios para dropdowns y tooltips) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-fQyVfCkWJYw2ldtzV6SqdO6gy6LqIv3GYp47Hh5i2M/moLhVUjXw+h7PbdFRLcl"
        crossorigin="anonymous"></script>
</body>

</html>
